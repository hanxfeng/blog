spring:
  application:
    name: blog

  datasource:
    url: jdbc:mysql://<your-host>:3306/blog?useSSL=false&serverTimezone=Asia/Shanghai&characterEncoding=utf8&allowPublicKeyRetrieval=true
    username: <your-username>
    password: <your-password>
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: <your-redis-host>
      port: 6379
      database: 0
      timeout: 3000
      lettuce:
        pool:
          max-active: 8
          max-idle: 8
          min-idle: 0
          max-wait: 10s
