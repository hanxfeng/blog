<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片上传测试 - /setImage</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f1f5f9;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .container {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.12);
            padding: 40px 35px;
            max-width: 600px;
            width: 100%;
        }
        h2 {
            font-size: 24px;
            color: #0f172a;
            margin-bottom: 6px;
        }
        .sub {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 28px;
        }
        .form-group {
            margin-bottom: 22px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            color: #1e293b;
            margin-bottom: 6px;
            font-size: 14px;
        }
        .form-group select,
        .form-group input[type="file"] {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 10px;
            font-size: 15px;
            background: #fafbfc;
            transition: border 0.2s;
        }
        .form-group select:focus,
        .form-group input[type="file"]:focus {
            outline: none;
            border-color: #3b82f6;
            background: #fff;
        }
        .upload-area {
            border: 2px dashed #d1d5db;
            border-radius: 12px;
            padding: 30px 20px;
            text-align: center;
            cursor: pointer;
            transition: all 0.2s;
            background: #fafbfc;
            position: relative;
        }
        .upload-area:hover {
            border-color: #3b82f6;
            background: #f0f7ff;
        }
        .upload-area .icon {
            font-size: 40px;
            display: block;
            margin-bottom: 6px;
        }
        .upload-area .file-name {
            font-weight: 500;
            color: #1e293b;
        }
        .upload-area .file-hint {
            font-size: 13px;
            color: #94a3b8;
            margin-top: 4px;
        }
        #fileInput {
            display: none;
        }
        .btn-upload {
            width: 100%;
            padding: 12px;
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 30px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .btn-upload:hover {
            background: #2563eb;
        }
        .btn-upload:disabled {
            background: #94a3b8;
            cursor: not-allowed;
        }
        .loader {
            display: none;
            margin: 16px auto 0;
            width: 32px;
            height: 32px;
            border: 4px solid #e2e8f0;
            border-top: 4px solid #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
        .result {
            margin-top: 20px;
            padding: 16px;
            border-radius: 12px;
            display: none;
            word-break: break-all;
        }
        .result.success {
            background: #ecfdf5;
            border-left: 5px solid #22c55e;
            display: block;
        }
        .result.error {
            background: #fef2f2;
            border-left: 5px solid #ef4444;
            display: block;
        }
        .result .msg {
            font-weight: 500;
            margin-bottom: 4px;
        }
        .result .detail {
            font-size: 13px;
            color: #475569;
        }
        .result .detail a {
            color: #3b82f6;
            text-decoration: none;
        }
        .result .detail a:hover {
            text-decoration: underline;
        }
        .preview {
            margin-top: 16px;
            border-radius: 12px;
            border: 1px solid #e2e8f0;
            overflow: hidden;
            display: none;
        }
        .preview img {
            width: 100%;
            max-height: 300px;
            object-fit: contain;
            display: block;
        }
        .clear-btn {
            background: none;
            border: none;
            color: #ef4444;
            cursor: pointer;
            font-size: 13px;
            padding: 4px 10px;
            border-radius: 20px;
            transition: background 0.2s;
            margin-top: 8px;
        }
        .clear-btn:hover {
            background: #fef2f2;
        }
        .note {
            margin-top: 16px;
            padding: 12px;
            background: #f8fafc;
            border-radius: 10px;
            font-size: 13px;
            color: #475569;
            border: 1px solid #e2e8f0;
        }
        .note code {
            background: #e2e8f0;
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 12px;
        }
    </style>
</head>
<body>
<div class="container">
    <h2>📸 图片上传测试</h2>
    <p class="sub">支持头像、背景、登录页背景</p>

    <div class="form-group">
        <label for="typeSelect">选择图片类型</label>
        <select id="typeSelect">
            <option value="AVATAR">头像 (AVATAR)</option>
            <option value="BACKGROUND">背景 (BACKGROUND)</option>
            <option value="LOGIN_BG">登录页背景 (LOGIN_BG)</option>
        </select>
    </div>

    <div class="form-group">
        <label>选择图片文件</label>
        <div class="upload-area" id="dropArea">
            <span class="icon">🖼️</span>
            <div class="file-name" id="fileName">点击或拖拽选择图片</div>
            <div class="file-hint" id="fileHint">支持 JPG / PNG</div>
            <input type="file" id="fileInput" accept=".jpg,.jpeg,.png" />
        </div>
    </div>

    <button class="btn-upload" id="uploadBtn" disabled>⬆ 上传</button>
    <div class="loader" id="loader"></div>

    <div class="result" id="result">
        <div class="msg" id="resultMsg"></div>
        <div class="detail" id="resultDetail"></div>
    </div>

    <div class="preview" id="previewContainer">
        <img id="previewImage" src="" alt="预览" />
        <button class="clear-btn" id="clearPreviewBtn">✕ 清除预览</button>
    </div>

    <div class="note">
        💡 <strong>提示：</strong><br>
        • 上传的文件会保存为固定文件名（如 <code>头像.jpg</code>），旧文件将被覆盖。<br>
        • 成功后会返回带时间戳的 URL，避免浏览器缓存。<br>
        • 确保后端已配置静态资源映射，否则预览可能失败。
    </div>
</div>

<script>
    (function() {
        const typeSelect = document.getElementById('typeSelect');
        const fileInput = document.getElementById('fileInput');
        const dropArea = document.getElementById('dropArea');
        const fileName = document.getElementById('fileName');
        const fileHint = document.getElementById('fileHint');
        const uploadBtn = document.getElementById('uploadBtn');
        const loader = document.getElementById('loader');
        const result = document.getElementById('result');
        const resultMsg = document.getElementById('resultMsg');
        const resultDetail = document.getElementById('resultDetail');
        const previewContainer = document.getElementById('previewContainer');
        const previewImage = document.getElementById('previewImage');
        const clearPreviewBtn = document.getElementById('clearPreviewBtn');

        let selectedFile = null;

        function updateUI(file) {
            if (file) {
                fileName.textContent = file.name;
                fileHint.textContent = `大小：${(file.size / 1024).toFixed(1)} KB，类型：${file.type || '未知'}`;
                uploadBtn.disabled = false;
            } else {
                fileName.textContent = '点击或拖拽选择图片';
                fileHint.textContent = '支持 JPG / PNG';
                uploadBtn.disabled = true;
            }
        }

        function clearResult() {
            result.className = 'result';
            result.style.display = 'none';
            resultMsg.textContent = '';
            resultDetail.innerHTML = '';
        }

        function clearPreview() {
            previewContainer.style.display = 'none';
            previewImage.src = '';
        }

        function handleFile(file) {
            selectedFile = file;
            updateUI(file);
            clearResult();
            clearPreview();

            // 如果是图片，立即预览
            if (file && file.type.startsWith('image/')) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    previewImage.src = e.target.result;
                    previewContainer.style.display = 'block';
                };
                reader.readAsDataURL(file);
            }
        }

        // 点击上传区域触发文件选择
        dropArea.addEventListener('click', function(e) {
            if (e.target === dropArea || e.target.closest('.upload-area')) {
                fileInput.click();
            }
        });

        fileInput.addEventListener('change', function() {
            if (this.files && this.files.length > 0) {
                handleFile(this.files[0]);
            } else {
                selectedFile = null;
                updateUI(null);
                clearResult();
                clearPreview();
            }
        });

        // 拖拽
        dropArea.addEventListener('dragover', function(e) {
            e.preventDefault();
            this.style.borderColor = '#3b82f6';
            this.style.background = '#e6f0ff';
        });
        dropArea.addEventListener('dragleave', function(e) {
            e.preventDefault();
            this.style.borderColor = '#d1d5db';
            this.style.background = '#fafbfc';
        });
        dropArea.addEventListener('drop', function(e) {
            e.preventDefault();
            this.style.borderColor = '#d1d5db';
            this.style.background = '#fafbfc';
            const files = e.dataTransfer.files;
            if (files && files.length > 0) {
                handleFile(files[0]);
                // 同步到 fileInput
                const dt = new DataTransfer();
                dt.items.add(files[0]);
                fileInput.files = dt.files;
            }
        });

        // 清除预览
        clearPreviewBtn.addEventListener('click', function() {
            clearPreview();
            // 不改变已选文件
        });

        // 上传
        uploadBtn.addEventListener('click', function() {
            if (!selectedFile) {
                alert('请先选择图片');
                return;
            }

            // 额外校验文件格式（与后端一致）
            const name = selectedFile.name;
            const suffix = name.includes('.') ? name.split('.').pop().toLowerCase() : '';
            if (!['jpg', 'jpeg', 'png'].includes(suffix)) {
                alert('请选择 JPG 或 PNG 格式的图片');
                return;
            }

            uploadBtn.disabled = true;
            loader.style.display = 'block';
            clearResult();
            clearPreview();

            const formData = new FormData();
            formData.append('file', selectedFile);
            formData.append('type', typeSelect.value);

            fetch('/file/setImage', {
                method: 'POST',
                body: formData
            })
            .then(response => response.json())
            .then(data => {
                loader.style.display = 'none';
                uploadBtn.disabled = false;

                result.style.display = 'block';
                if (data.success) {
                    result.className = 'result success';
                    resultMsg.textContent = '✅ ' + (data.msg || '上传成功');
                    resultDetail.innerHTML = `
                        <span style="font-weight:500;">文件名：</span>${data.fileName || ''}<br>
                        <span style="font-weight:500;">预览URL：</span>
                        <a href="${data.url}" target="_blank">${data.url}</a>
                    `;
                    // 如果返回了 url，用该 url 预览（后端已加时间戳，可直接显示最新）
                    if (data.url) {
                        previewImage.src = data.url;
                        previewContainer.style.display = 'block';
                    }
                } else {
                    result.className = 'result error';
                    resultMsg.textContent = '❌ ' + (data.msg || '上传失败');
                    resultDetail.textContent = '';
                }
            })
            .catch(error => {
                loader.style.display = 'none';
                uploadBtn.disabled = false;
                result.style.display = 'block';
                result.className = 'result error';
                resultMsg.textContent = '❌ 请求异常：' + error.message;
                resultDetail.textContent = '';
            });
        });

        // 初始状态
        updateUI(null);
        clearResult();
        clearPreview();
    })();
</script>
</body>
</html>
