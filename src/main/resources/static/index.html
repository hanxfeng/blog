<!DOCTYPE html>
<html lang="zh-CN" data-theme="light">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>韩行风 · 笔耕不辍</title>

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- GitHub Markdown 样式 (用于渲染文章) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/github-markdown-css/github-markdown.min.css">

    <!-- highlight.js 主题 (代码高亮) -->
    <link rel="stylesheet"
          href="https://cdn.jsdelivr.net/npm/highlight.js/styles/github.min.css">

    <style>
        :root {
            --bg: #f9fafb;
            --card-bg: #ffffff;
            --card-border: #f0f0f0;
            --text-primary: #1f2937;
            --text-secondary: #6b7280;
            --text-muted: #9ca3af;
            --header-text: #111827;
            --hover-bg: #f9fafb;
            --modal-overlay: rgba(0,0,0,0.4);
            --code-bg: #111827;
            --input-bg: #ffffff;
            --input-border: #e5e7eb;
            --shadow: rgba(0,0,0,0.05);
        }

        [data-theme="dark"] {
            --bg: #0d1117;
            --card-bg: #161b22;
            --card-border: #30363d;
            --text-primary: #c9d1d9;
            --text-secondary: #8b949e;
            --text-muted: #6e7681;
            --header-text: #e6edf3;
            --hover-bg: #1c2129;
            --modal-overlay: rgba(0,0,0,0.7);
            --code-bg: #0d1117;
            --input-bg: #0d1117;
            --input-border: #30363d;
            --shadow: rgba(0,0,0,0.3);
        }

        body {
            background-color: var(--bg);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
            color: var(--text-primary);
            transition: background-color 0.3s, color 0.3s;
        }

        /* 背景图容器：占屏幕 1/3 */
        .hero-section {
            height: 66vh;
            position: relative;
            overflow: hidden;
        }

        .hero-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* GitHub 风格热力图格子 */
        .contribution-grid {
            display: grid;
            grid-template-rows: repeat(7, 1fr);
            grid-auto-flow: column;
            gap: 3px;
        }

        .square {
            width: 11px;
            height: 11px;
            border-radius: 2px;
            background-color: #ebedf0;
            transition: transform 0.2s;
        }

        .square:hover {
            transform: scale(1.3);
            border: 1px solid #999;
        }

        /* 颜色阶梯：根据代码修改行数深浅 */
        .level-0 { background-color: #ebedf0; }
        .level-1 { background-color: #9be9a8; }
        .level-2 { background-color: #40c463; }
        .level-3 { background-color: #30a14e; }
        .level-4 { background-color: #216e39; }

        [data-theme="dark"] .level-0 { background-color: #161b22; }
        [data-theme="dark"] .level-1 { background-color: #0e4429; }
        [data-theme="dark"] .level-2 { background-color: #006d32; }
        [data-theme="dark"] .level-3 { background-color: #26a641; }
        [data-theme="dark"] .level-4 { background-color: #39d353; }

        /* 动画 */
        .fade-in {
            animation: fadeIn 0.35s ease;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(10px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        /*
           markdown-body 样式微调，让它与原有设计融合
           同时保留文章内容的阅读舒适度
        */
        .markdown-body {
            background: transparent;
            padding: 0 !important;
            font-size: 16px;
            line-height: 1.75;
            color: var(--text-primary);
        }

        .markdown-body pre {
            background: var(--code-bg);
            border-radius: 12px;
            margin: 1.2em 0;
            position: relative;
        }

        .markdown-body code {
            font-family: Consolas, 'Courier New', monospace;
            font-size: 0.9em;
        }

        /* 文章容器样式 */
        .article-wrapper {
            background: var(--card-bg);
            border-radius: 1.5rem;
            box-shadow: 0 1px 3px var(--shadow);
            border: 1px solid var(--card-border);
        }

        /* 多行省略工具类 (line-clamp) */
        .line-clamp-2 {
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .line-clamp-3 {
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* 卡片统一样式 */
        .card {
            background: var(--card-bg);
            border-radius: 1rem;
            box-shadow: 0 1px 3px var(--shadow);
            border: 1px solid var(--card-border);
        }

        /* 主题切换按钮 */
        .theme-toggle {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            border: 1px solid var(--card-border);
            background: var(--card-bg);
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            transition: all 0.3s;
            color: var(--text-primary);
        }
        .theme-toggle:hover {
            transform: scale(1.1);
            box-shadow: 0 2px 8px var(--shadow);
        }

        /* 搜索栏 */
        .search-bar {
            display: flex;
            gap: 8px;
            align-items: center;
        }
        .search-input {
            flex: 1;
            padding: 10px 16px;
            border-radius: 12px;
            border: 1px solid var(--input-border);
            background: var(--input-bg);
            color: var(--text-primary);
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .search-input:focus {
            border-color: #3b82f6;
            box-shadow: 0 0 0 3px rgba(59,130,246,0.15);
        }
        .search-input::placeholder {
            color: var(--text-muted);
        }

        /* 代码块复制按钮 */
        .code-block-wrapper {
            position: relative;
        }
        .copy-btn {
            position: absolute;
            top: 8px;
            right: 8px;
            padding: 4px 10px;
            font-size: 12px;
            border-radius: 6px;
            border: 1px solid rgba(255,255,255,0.2);
            background: rgba(255,255,255,0.1);
            color: #c9d1d9;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s, background 0.2s;
            z-index: 5;
        }
        .code-block-wrapper:hover .copy-btn {
            opacity: 1;
        }
        .copy-btn:hover {
            background: rgba(255,255,255,0.2);
        }
        .copy-btn.copied {
            background: #238636;
            border-color: #238636;
            color: #fff;
        }

        /* 回到顶部按钮 */
        .back-to-top {
            position: fixed;
            bottom: 32px;
            right: 32px;
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            box-shadow: 0 4px 12px var(--shadow);
            cursor: pointer;
            font-size: 20px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--text-primary);
            opacity: 0;
            visibility: hidden;
            transform: translateY(20px);
            transition: all 0.3s;
            z-index: 50;
        }
        .back-to-top.visible {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }
        .back-to-top:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px var(--shadow);
        }

        /* 详情弹窗 */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: var(--modal-overlay);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 100;
            opacity: 0;
            visibility: hidden;
            transition: opacity 0.25s, visibility 0.25s;
        }
        .modal-overlay.active {
            opacity: 1;
            visibility: visible;
        }
        .modal-dialog {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 28px 32px;
            max-width: 420px;
            width: 90%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            border: 1px solid var(--card-border);
            transform: translateY(20px);
            transition: transform 0.25s;
            color: var(--text-primary);
        }
        .modal-overlay.active .modal-dialog {
            transform: translateY(0);
        }
        .modal-close {
            float: right;
            background: none;
            border: none;
            font-size: 22px;
            cursor: pointer;
            color: var(--text-muted);
            line-height: 1;
            padding: 0;
        }
        .modal-close:hover {
            color: var(--text-primary);
        }

        /* 文章详情页日期与点击量 */
        .detail-meta {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* 置顶标记 */
        .pin-badge {
            display: inline-block;
            padding: 1px 6px;
            font-size: 10px;
            border-radius: 4px;
            color: #fff;
            background: #f59e0b;
            margin-right: 6px;
            vertical-align: middle;
        }
    </style>
</head>
<body>

<!-- 顶部 -->
<header class="relative">
    <div class="hero-section">
        <img src="images/背景.png" alt="背景" class="hero-image">
    </div>

    <!-- 右上角个人信息 + 主题切换 -->
    <div class="absolute top-6 right-8 flex items-center space-x-3 bg-white/50 backdrop-blur-md p-2 rounded-full px-4 border border-white/30 shadow-sm">
        <button class="theme-toggle" id="theme-toggle" title="切换暗色模式" onclick="toggleTheme()">🌙</button>
        <span class="font-medium text-gray-800">韩行风</span>
        <img src="images/头像.jpg" alt="头像" class="w-8 h-8 rounded-full border-2 border-white object-cover">
    </div>
</header>

<!-- 主体 -->
<main class="max-w-4xl mx-auto -mt-12 relative z-10 px-4">

    <!-- 首页顶部统计 -->
    <div id="home-header" class="flex flex-col md:flex-row gap-8 items-start">

        <!-- 左侧统计 -->
        <div class="w-full md:w-1/3 card p-6">
            <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest mb-4">
                Yesterday's Code
            </h3>
            <div class="space-y-6">
                <div>
                    <p class="text-3xl font-light" id="yesterday-additions" style="color:#22c55e">0</p>
                    <p class="text-sm" style="color: var(--text-secondary)">昨日增加代码行数</p>
                </div>
                <div>
                    <p class="text-3xl font-light" id="yesterday-deletions" style="color:#ef4444">0</p>
                    <p class="text-sm" style="color: var(--text-secondary)">昨日减少代码行数</p>
                </div>
                <div class="text-right">
                    <button onclick="showDetailModal()"
                            class="text-xs text-blue-500 hover:text-blue-600 transition cursor-pointer bg-transparent border-none">
                        详细信息 →
                    </button>
                </div>
            </div>
        </div>

        <!-- 热力图 -->
        <div class="w-full md:w-2/3 card p-6">
            <div class="flex justify-between items-center mb-4">
                <h3 class="text-xs font-bold text-gray-400 uppercase tracking-widest">Code Activity</h3>
                <p class="text-xs" style="color: var(--text-muted)">笔耕不辍，岁序更新</p>
                <span class="text-xs" style="color: var(--text-muted)" id="start-date-label">From 2026-01-01</span>
            </div>
            <div class="overflow-x-auto pb-2">
                <div class="contribution-grid" id="heatmap"></div>
            </div>
            <div class="flex items-center justify-end mt-2 space-x-1 text-[10px]" style="color: var(--text-muted)">
                <span>Less</span>
                <div class="square level-0"></div>
                <div class="square level-1"></div>
                <div class="square level-2"></div>
                <div class="square level-3"></div>
                <div class="square level-4"></div>
                <span>More</span>
            </div>
        </div>
    </div>

    <!-- 搜索栏 -->
    <div id="search-section" class="mt-6 card p-4">
        <div class="search-bar">
            <input type="text" class="search-input" id="search-input" placeholder="搜索文章标题..."
                   onkeydown="if(event.key==='Enter') doSearch()">
            <button onclick="doSearch()"
                    class="px-5 py-2.5 bg-blue-500 text-white rounded-xl text-sm font-medium hover:bg-blue-600 transition whitespace-nowrap">
                搜索
            </button>
            <button onclick="clearSearch()" id="clear-search-btn"
                    class="px-4 py-2.5 border rounded-xl text-sm hover:bg-gray-50 transition whitespace-nowrap hidden"
                    style="border-color: var(--input-border); color: var(--text-secondary); background: var(--card-bg)">
                清除
            </button>
        </div>
    </div>

    <!-- 动态内容区域：文章列表 / 详情 -->
    <div id="main-content" class="fade-in mt-8"></div>

    <!-- 分页控件（仅列表页） -->
    <div id="pagination" class="mt-10 flex justify-center space-x-4 hidden">
        <button onclick="changePage(-1)" class="px-4 py-2 card text-sm hover:bg-gray-50 transition">上一页</button>
        <span id="page-info" class="self-center text-sm" style="color: var(--text-secondary)">第 1 页</span>
        <button onclick="changePage(1)" class="px-4 py-2 card text-sm hover:bg-gray-50 transition">下一页</button>
    </div>

</main>

<!-- 回到顶部按钮 -->
<button class="back-to-top" id="back-to-top" onclick="scrollToTop()" title="回到顶部">↑</button>

<!-- 详细信息弹窗 -->
<div class="modal-overlay" id="detail-modal-overlay" onclick="closeDetailModal(event)">
    <div class="modal-dialog" onclick="event.stopPropagation()">
        <button class="modal-close" onclick="closeDetailModal()">&times;</button>
        <h3 class="text-lg font-bold mb-6" style="color: var(--header-text)">详细信息</h3>
        <div class="space-y-4">
            <div class="flex justify-between items-center py-2" style="border-bottom: 1px solid var(--card-border)">
                <span style="color: var(--text-secondary)">历史总笔记字数</span>
                <span class="font-semibold" id="modal-total-words">--</span>
            </div>
            <div class="flex justify-between items-center py-2" style="border-bottom: 1px solid var(--card-border)">
                <span style="color: var(--text-secondary)">历史代码总数</span>
                <span class="font-semibold" id="modal-total-code">--</span>
            </div>
            <div class="flex justify-between items-center py-2">
                <span style="color: var(--text-secondary)">今日代码修改字数</span>
                <span class="font-semibold" id="modal-today-code">--</span>
            </div>
        </div>
    </div>
</div>

<!-- 引入 markdown-it (渲染 Markdown) -->
<script src="https://cdn.jsdelivr.net/npm/markdown-it/dist/markdown-it.min.js"></script>
<!-- highlight.js 核心库 -->
<script src="https://cdn.jsdelivr.net/npm/highlight.js/lib/common.min.js"></script>

<script>
    // =========================
    // 1. 初始化 markdown-it 渲染器
    // =========================
    const md = window.markdownit({
        html: false,
        linkify: true,
        typographer: true,
        highlight: function (str, lang) {
            if (lang && hljs.getLanguage(lang)) {
                try {
                    return hljs.highlight(str, { language: lang }).value;
                } catch (__) {}
            }
            return '';
        }
    });

    // =========================
    // 全局变量 & API 地址
    // =========================
    let currentPage = 1;
    let totalPages = 1;
    let searchMode = false;
    let searchKeyword = '';
    let detailModalData = {}; // 缓存弹窗数据
    const API_BASE = "http://localhost:8080";

    // =========================
    // 辅助方法：渲染 Markdown 内容，并高亮代码块
    // =========================
    function renderMarkdownToHtml(markdownText) {
        if (!markdownText) return '<p class="text-center" style="color: var(--text-muted)">暂无内容</p>';
        let renderedHtml = md.render(markdownText);
        const wrapper = document.createElement('div');
        wrapper.innerHTML = renderedHtml;
        wrapper.querySelectorAll('pre code').forEach((block) => {
            hljs.highlightElement(block);
        });
        return wrapper.innerHTML;
    }

    // =========================
    // 辅助：转义 HTML
    // =========================
    function escapeHtml(str) {
        if (!str) return '';
        return str.replace(/[&<>]/g, function(m) {
            if (m === '&') return '&amp;';
            if (m === '<') return '&lt;';
            if (m === '>') return '&gt;';
            return m;
        }).replace(/[\uD800-\uDBFF][\uDC00-\uDFFF]/g, function(c) {
            return c;
        });
    }

    // =========================
    // 主题切换
    // =========================
    function initTheme() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.documentElement.setAttribute('data-theme', 'dark');
            document.getElementById('theme-toggle').innerText = '☀️';
        } else {
            document.documentElement.setAttribute('data-theme', 'light');
            document.getElementById('theme-toggle').innerText = '🌙';
        }
    }

    function toggleTheme() {
        const current = document.documentElement.getAttribute('data-theme');
        const next = current === 'dark' ? 'light' : 'dark';
        document.documentElement.setAttribute('data-theme', next);
        localStorage.setItem('theme', next);
        document.getElementById('theme-toggle').innerText = next === 'dark' ? '☀️' : '🌙';
    }

    // =========================
    // 初始化：判断列表页 or 详情页
    // =========================
    function init() {
        initTheme();
        initBackToTop();
        const params = new URLSearchParams(window.location.search);
        const articleId = params.get("id");
        if (articleId) {
            renderDetailView(articleId);
        } else {
            renderHomeView();
        }
    }

    // =========================
    // 首页视图 (列表 + 统计)
    // =========================
    async function renderHomeView() {
        document.getElementById("home-header").classList.remove("hidden");
        document.getElementById("search-section").classList.remove("hidden");
        document.getElementById("pagination").classList.remove("hidden");
        document.getElementById("back-to-top").classList.add("visible");
        await loadStats();
        await fetchArticles(currentPage);
    }

    // =========================
    // 获取文章列表（支持置顶排序）
    // =========================
    async function fetchArticles(page) {
        try {
            const res = await fetch(`${API_BASE}/blog/getBriefWritings?current=${page}`);
            const result = await res.json();
            if (result.code === 1) {
                const container = document.getElementById("main-content");
                let list = result.data.records || [];
                totalPages = result.data.pages || 1;

                // 置顶排序：isTop=1 在前（按日期升序），其余在后（保持原序）
                const pinned = list.filter(item => item.isTop === 1)
                    .sort((a, b) => new Date(a.date) - new Date(b.date));
                const unpinned = list.filter(item => item.isTop !== 1);
                list = [...pinned, ...unpinned];

                let html = `<div class="grid grid-cols-1 gap-3">`;
                list.forEach(item => {
                    const previewText = (item.preview || "").trim();
                    const displayPreview = previewText ? escapeHtml(previewText) : "✨ 这篇文章暂无摘要，点击阅读全文。";
                    const pinBadge = item.isTop === 1 ? '<span class="pin-badge">置顶</span>' : '';

                    html += `
                        <div onclick="goToDetail(${item.id})"
                             class="card p-5 hover:shadow-md transition-all cursor-pointer group">
                            <h3 class="text-base font-medium group-hover:text-blue-600 transition-colors" style="color: var(--header-text)">
                                ${pinBadge}${escapeHtml(item.title) || "无标题"}
                            </h3>
                            <div class="text-xs mt-1.5 leading-relaxed line-clamp-2" style="color: var(--text-secondary)">
                                ${displayPreview}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;

                if (list.length === 0) {
                    html = `<div class="text-center py-16 card" style="color: var(--text-muted)">暂无文章，静待更新</div>`;
                }
                container.innerHTML = html;
                document.getElementById("page-info").innerText = `第 ${result.data.current} / ${result.data.pages} 页`;
            } else {
                throw new Error("接口返回失败");
            }
        } catch (e) {
            console.error(e);
            document.getElementById("main-content").innerHTML = `<div class="text-center py-20 card p-10" style="color: var(--text-muted)">文章列表加载失败，请稍后重试</div>`;
        }
    }

    // =========================
    // 搜索文章
    // =========================
    async function doSearch(page) {
        const keyword = document.getElementById("search-input").value.trim();
        if (!keyword) {
            clearSearch();
            return;
        }
        searchMode = true;
        searchKeyword = keyword;
        if (page) currentPage = page; else currentPage = 1;

        document.getElementById("clear-search-btn").classList.remove("hidden");

        try {
            const formData = new URLSearchParams();
            formData.append('keyLike', keyword);
            formData.append('pageNum', currentPage);
            formData.append('pageSize', '9');

            const res = await fetch(`${API_BASE}/blog/selectWriting`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData
            });
            const result = await res.json();
            if (result.code === 1) {
                const container = document.getElementById("main-content");
                let list = result.data.records || [];
                totalPages = result.data.pages || 1;

                let html = `<div class="grid grid-cols-1 gap-3">`;
                list.forEach(item => {
                    const previewText = (item.preview || "").trim();
                    const displayPreview = previewText ? escapeHtml(previewText) : "✨ 这篇文章暂无摘要，点击阅读全文。";

                    html += `
                        <div onclick="goToDetail(${item.id})"
                             class="card p-5 hover:shadow-md transition-all cursor-pointer group">
                            <h3 class="text-base font-medium group-hover:text-blue-600 transition-colors" style="color: var(--header-text)">
                                ${escapeHtml(item.title) || "无标题"}
                            </h3>
                            <div class="text-xs mt-1.5 leading-relaxed line-clamp-2" style="color: var(--text-secondary)">
                                ${displayPreview}
                            </div>
                        </div>
                    `;
                });
                html += `</div>`;

                if (list.length === 0) {
                    html = `<div class="text-center py-16 card" style="color: var(--text-muted)">未找到匹配的文章</div>`;
                }
                container.innerHTML = html;
                document.getElementById("page-info").innerText = `第 ${result.data.current} / ${result.data.pages} 页`;
            } else {
                throw new Error("搜索失败");
            }
        } catch (e) {
            console.error(e);
            document.getElementById("main-content").innerHTML = `<div class="text-center py-20 card p-10" style="color: var(--text-muted)">搜索失败，请稍后重试</div>`;
        }
    }

    function clearSearch() {
        searchMode = false;
        searchKeyword = '';
        currentPage = 1;
        document.getElementById("search-input").value = '';
        document.getElementById("clear-search-btn").classList.add("hidden");
        fetchArticles(currentPage);
    }

    // =========================
    // 详情页视图
    // =========================
    async function renderDetailView(id) {
        document.getElementById("home-header").classList.add("hidden");
        document.getElementById("search-section").classList.add("hidden");
        document.getElementById("pagination").classList.add("hidden");

        try {
            const res = await fetch(`${API_BASE}/blog/getOne/${id}`);
            const result = await res.json();
            if (result.code === 1) {
                const article = result.data;
                const rawMarkdown = article.content || "";
                const renderedHtml = renderMarkdownToHtml(rawMarkdown);

                const detailHtml = `
                    <div class="article-wrapper bg-white p-10 rounded-3xl shadow-sm border min-h-[500px]" style="background: var(--card-bg); border-color: var(--card-border)">
                        <button onclick="window.location.href='?page=home'"
                                class="text-xs hover:text-gray-800 mb-8 flex items-center transition" style="color: var(--text-muted)">
                            ← 返回起始页
                        </button>
                        <h1 class="text-4xl font-bold mb-4" style="color: var(--header-text)">
                            ${escapeHtml(article.title) || "无标题"}
                        </h1>
                        <div class="detail-meta text-sm pb-6 mb-10" style="color: var(--text-secondary); border-bottom: 1px solid var(--card-border)">
                            <span>发布于 ${article.date || article.createTime || "未知时间"}</span>
                            <span>👁 ${article.viewCount || 0} 次阅读</span>
                        </div>
                        <div class="markdown-body">
                            ${renderedHtml}
                        </div>
                    </div>
                `;

                document.getElementById("main-content").innerHTML = detailHtml;

                // 二次高亮 + 添加代码复制按钮
                document.querySelectorAll('.markdown-body pre code').forEach((block) => {
                    hljs.highlightElement(block);
                });
                addCodeCopyButtons();
            } else {
                throw new Error("文章不存在或加载失败");
            }
        } catch (e) {
            console.error(e);
            document.getElementById("main-content").innerHTML = `
                <div class="text-center py-20 card p-10" style="color: var(--text-muted)">
                    文章加载失败，请稍后重试
                </div>
            `;
        }
    }

    // =========================
    // 为代码块添加复制按钮
    // =========================
    function addCodeCopyButtons() {
        document.querySelectorAll('.markdown-body pre').forEach((pre) => {
            // 避免重复添加
            if (pre.parentElement.classList.contains('code-block-wrapper')) return;

            const wrapper = document.createElement('div');
            wrapper.className = 'code-block-wrapper';
            pre.parentNode.insertBefore(wrapper, pre);
            wrapper.appendChild(pre);

            const copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerText = '复制';
            copyBtn.onclick = function() {
                const code = pre.querySelector('code');
                const text = code ? code.innerText : pre.innerText;
                navigator.clipboard.writeText(text).then(() => {
                    copyBtn.innerText = '已复制';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.innerText = '复制';
                        copyBtn.classList.remove('copied');
                    }, 1500);
                }).catch(() => {
                    // 降级方案
                    const textarea = document.createElement('textarea');
                    textarea.value = text;
                    textarea.style.position = 'fixed';
                    textarea.style.opacity = '0';
                    document.body.appendChild(textarea);
                    textarea.select();
                    try { document.execCommand('copy'); } catch (e) {}
                    document.body.removeChild(textarea);
                    copyBtn.innerText = '已复制';
                    copyBtn.classList.add('copied');
                    setTimeout(() => {
                        copyBtn.innerText = '复制';
                        copyBtn.classList.remove('copied');
                    }, 1500);
                });
            };
            wrapper.appendChild(copyBtn);
        });
    }

    // =========================
    // 跳转详情
    // =========================
    function goToDetail(id) {
        window.location.href = `?id=${id}`;
    }

    // =========================
    // 分页控制
    // =========================
    function changePage(delta) {
        const nextPage = currentPage + delta;
        if (nextPage < 1 || nextPage > totalPages) return;
        currentPage = nextPage;
        if (searchMode) {
            doSearch(currentPage);
        } else {
            fetchArticles(currentPage);
        }
        window.scrollTo({ top: 400, behavior: "smooth" });
    }

    // =========================
    // 加载统计数据 + 热力图
    // =========================
    async function loadStats() {
        try {
            // 并行获取数据
            const [resCommit, resAllCommit, resYesterday, resSum] = await Promise.all([
                fetch(`${API_BASE}/blog/selectOneCommitCount`),
                fetch(`${API_BASE}/blog/selectAllCommit`),
                fetch(`${API_BASE}/blog/selectYesterday`),
                fetch(`${API_BASE}/blog/sumCommit`)
            ]);

            const commitResult = await resCommit.json();
            const allCommitResult = await resAllCommit.json();
            const yesterdayResult = await resYesterday.json();
            const sumResult = await resSum.json();

            // 左侧统计：昨日增加/减少代码行数
            if (commitResult.code === 1 && commitResult.data) {
                document.getElementById("yesterday-additions").innerText = commitResult.data.additions || 0;
                document.getElementById("yesterday-deletions").innerText = commitResult.data.deletions || 0;
            }

            // 缓存弹窗所需数据
            if (yesterdayResult.code === 1 && yesterdayResult.data) {
                detailModalData.totalNoteWordCount = yesterdayResult.data.totalNoteWordCount || 0;
            }
            if (sumResult.code === 1) {
                detailModalData.sumCommit = sumResult.data || 0;
            }
            // 今日代码修改字数：从 selectAllCommit 中找今天的记录
            if (allCommitResult.code === 1 && allCommitResult.data) {
                const todayStr = new Date().toLocaleDateString("sv-SE");
                const todayEntry = allCommitResult.data.find(item => {
                    let dateStr = item.commitTime;
                    if (Array.isArray(dateStr)) {
                        dateStr = `${dateStr[0]}-${String(dateStr[1]).padStart(2, '0')}-${String(dateStr[2]).padStart(2, '0')}`;
                    }
                    return dateStr === todayStr;
                });
                detailModalData.todayCodeChanges = todayEntry ? (todayEntry.totalChanges || 0) : 0;
            }

            // 热力图：使用 selectAllCommit 数据
            if (allCommitResult.code === 1) {
                renderHeatmap(allCommitResult.data || []);
            } else {
                renderHeatmap([]);
            }
        } catch (error) {
            console.error("数据加载失败:", error);
            renderHeatmap([]);
        }
    }

    // 热力图渲染 —— 使用 totalChanges
    function renderHeatmap(dataList) {
        const heatmap = document.getElementById("heatmap");
        heatmap.innerHTML = "";

        const daysToShow = 365;
        const currentYear = new Date().getFullYear();
        const startDate = new Date(`${currentYear}-01-01`);
        const dataMap = new Map();

        if (dataList && Array.isArray(dataList)) {
            dataList.forEach(item => {
                let dateStr = item.commitTime;
                // 兼容 LocalDate 序列化为数组的情况 [2026, 6, 29]
                if (Array.isArray(dateStr)) {
                    dateStr = `${dateStr[0]}-${String(dateStr[1]).padStart(2, '0')}-${String(dateStr[2]).padStart(2, '0')}`;
                }
                if (dateStr) dataMap.set(dateStr, item.totalChanges || 0);
            });
        }

        for (let i = 0; i < daysToShow; i++) {
            const currentDate = new Date(startDate);
            currentDate.setDate(startDate.getDate() + i);
            const dateStr = currentDate.toLocaleDateString("sv-SE");
            const changes = dataMap.get(dateStr) || 0;
            const level = getLevel(changes);
            const square = document.createElement("div");
            square.className = `square level-${level}`;
            square.title = `${dateStr}: ${changes} 行代码变更`;
            heatmap.appendChild(square);
        }

        document.getElementById("start-date-label").innerText = `From ${currentYear}-01-01`;
    }

    function getLevel(count) {
        if (count <= 0) return 0;
        if (count < 50) return 1;
        if (count < 200) return 2;
        if (count < 500) return 3;
        return 4;
    }

    // =========================
    // 详细信息弹窗
    // =========================
    function showDetailModal() {
        document.getElementById("modal-total-words").innerText = (detailModalData.totalNoteWordCount || 0).toLocaleString();
        document.getElementById("modal-total-code").innerText = (detailModalData.sumCommit || 0).toLocaleString();
        document.getElementById("modal-today-code").innerText = (detailModalData.todayCodeChanges || 0).toLocaleString();
        document.getElementById("detail-modal-overlay").classList.add("active");
    }

    function closeDetailModal(event) {
        if (event && event.target !== document.getElementById("detail-modal-overlay")) return;
        document.getElementById("detail-modal-overlay").classList.remove("active");
    }

    // =========================
    // 回到顶部
    // =========================
    function initBackToTop() {
        const btn = document.getElementById("back-to-top");
        window.addEventListener("scroll", function() {
            if (window.scrollY > window.innerHeight) {
                btn.classList.add("visible");
            } else {
                btn.classList.remove("visible");
            }
        });
    }

    function scrollToTop() {
        window.scrollTo({ top: 0, behavior: "smooth" });
    }

    // 启动
    init();
</script>
